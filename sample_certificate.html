<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Georgia', serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
        }

        .border-wrap {
            border: 10px double #1a237e;
            /* Deep Blue Double Border */
            padding: 30px;
            height: 900px;
            /* Adjust based on paper size */
            position: relative;
        }

        .logo {
            margin-bottom: 20px;
            max-height: 80px;
        }

        h1 {
            color: #1a237e;
            font-size: 48px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
        }

        .certifies {
            font-size: 24px;
            font-style: italic;
            color: #333;
            margin-bottom: 20px;
        }

        .student-name {
            font-size: 42px;
            font-weight: bold;
            color: #000;
            border-bottom: 2px solid #ccc;
            display: inline-block;
            min-width: 400px;
            padding-bottom: 5px;
            margin-bottom: 20px;
            font-family: 'Arial', sans-serif;
            /* Contrast font */
        }

        .course-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
        }

        .course-name {
            font-size: 32px;
            font-weight: bold;
            color: #1a237e;
            margin-bottom: 30px;
        }

        .details {
            font-size: 16px;
            color: #555;
            margin-bottom: 50px;
        }

        .footer {
            display: table;
            width: 100%;
            margin-top: 50px;
        }

        .signature-block {
            display: table-cell;
            width: 33%;
            vertical-align: bottom;
            text-align: center;
        }

        .line {
            border-top: 2px solid #333;
            width: 80%;
            margin: 10px auto 5px auto;
        }

        .label {
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="border-wrap">
            <!-- Optional: Logo placeholder. If you set [college_logo_url], use <img src="[college_logo_url]" class="logo"> -->
            <!-- <img src="[college_logo_url]" class="logo" alt="College Logo"> -->

            <h1>Certificate of Completion</h1>
            <p class="subtitle">Awarded to</p>

            <div class="student-name">[student_name]</div>

            <p class="certifies">This is to certify that the above mentioned student has successfully completed the
                course</p>

            <div class="course-name">[course_name]</div>

            <div class="details">
                Enrollment No: <strong>[enrollment_number]</strong> | Batch: <strong>[batch_name]</strong>
                <br>
                Issued on: <strong>[issue_date]</strong>
            </div>

            <div class="footer">
                <div class="signature-block">
                    <div class="line"></div>
                    <div class="label">Course Coordinator</div>
                </div>
                <div class="signature-block">
                    <!-- Space for stamp/logo -->
                    <!-- <img src="path/to/stamp.png" style="height: 80px; opacity: 0.8;"> -->
                </div>
                <div class="signature-block">
                    <div class="line"></div>
                    <div class="label">Principal / Director</div>
                    <div style="font-size: 12px; margin-top: 5px;">[college_name]</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
